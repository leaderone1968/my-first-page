<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocky · 个人链接</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0a0a0f;
      --bg-2: #111118;
      --bg-3: #16161f;
      --card: rgba(255, 255, 255, 0.05);
      --card-hover: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f1f5f9;
      --text-muted: rgba(241, 245, 249, 0.65);
      --accent: #818cf8;
      --accent-glow: rgba(129, 140, 248, 0.25);
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 420px;
      height: 420px;
      background: rgba(99, 102, 241, 0.12);
      top: -120px;
      right: -80px;
    }

    body::after {
      width: 360px;
      height: 360px;
      background: rgba(30, 30, 40, 0.8);
      bottom: -100px;
      left: -60px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.7s ease-out both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile {
      text-align: center;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04), 0 12px 40px var(--accent-glow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.2), 0 16px 48px var(--accent-glow);
    }

    .name {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-muted);
      max-width: 320px;
      margin: 0 auto;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      list-style: none;
    }

    .link {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 1rem 1.125rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
    }

    .link::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(129, 140, 248, 0.12) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .link:hover {
      transform: translateY(-3px) scale(1.02);
      background: var(--card-hover);
      border-color: rgba(129, 140, 248, 0.5);
      color: #fff;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(129, 140, 248, 0.15);
    }

    .link:hover::before {
      transform: translateX(100%);
    }

    .link:active {
      transform: translateY(-1px) scale(1.01);
    }

    .link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
      opacity: 0.9;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .link:hover .icon svg {
      transform: scale(1.15);
      opacity: 1;
    }

    .label {
      flex: 1;
      text-align: left;
    }

    .arrow {
      opacity: 0.45;
      font-size: 1.1rem;
      line-height: 1;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .link:hover .arrow {
      opacity: 1;
      transform: translateX(4px);
      color: var(--accent);
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(248, 250, 252, 0.4);
    }

    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
      }

      .name {
        font-size: 1.5rem;
      }

      .avatar {
        width: 84px;
        height: 84px;
      }
    }
  </style>
</head>
<body>
